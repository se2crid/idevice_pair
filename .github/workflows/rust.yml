# Workflow by se2cird <https://github.com/se2cird>, ask me if you have any questions

# Workflow to build and upload AppImage for Linux, macOS Universal DMG, and Windows .exe

name: Rust Cross-Platform Builds

# Trigger configuration
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '1.0.0'

# Global environment variables
env:
  BINARY_NAME: idevice_pair
  APP_NAME: iDevicePair
  VERSION: ${{ github.event.inputs.version }}
  ICON_PNG: icon.png
  CARGO_TERM_COLOR: always

jobs:
  # Linux builds
  build-appimage:
    name: Build & Upload AppImage (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            toolfile: appimagetool-x86_64.AppImage
          - arch: aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            toolfile: appimagetool-aarch64.AppImage

    steps:
      - uses: actions/checkout@v3

      # Build setup
      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libatk1.0-dev \
            libgtk-3-dev \
            pkg-config \
            libfuse2 \
            appstream \
            usbmuxd

      # Build and package
      - name: Build binary
        run: cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Download appimagetool
        run: |
          wget -c https://github.com/AppImage/AppImageKit/releases/download/continuous/${{ matrix.toolfile }} \
            -O appimagetool.AppImage
          chmod +x appimagetool.AppImage

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons/hicolor/256x256/apps AppDir/etc/udev/rules.d
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} AppDir/usr/bin/
          cp $(which usbmuxd) AppDir/usr/bin/
          sudo cp /lib/udev/rules.d/39-usbmuxd.rules AppDir/etc/udev/rules.d/
          ICON_NAME=${ICON_PNG##*/}; BASENAME=${ICON_NAME%.*}
          cp ${{ env.ICON_PNG }} AppDir/${BASENAME}.png
          cp ${{ env.ICON_PNG }} AppDir/usr/share/icons/hicolor/256x256/apps/${BASENAME}.png
          cat > AppDir/${{ env.BINARY_NAME }}.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=${{ env.APP_NAME }}
          Exec=${{ env.BINARY_NAME }} %u
          Icon=${BASENAME}
          Categories=Utility;
          EOF
          ln -s usr/bin/${{ env.BINARY_NAME }} AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          FILENAME="${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage"
          ./appimagetool.AppImage AppDir "$FILENAME"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage
          path: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage

  # macOS builds
  macos-universal:
    name: Build macOS slices
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust for ${{ matrix.arch }}
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: ${{ matrix.target }}

      - name: Build ${{ matrix.arch }} slice
        run: |
          cargo build --release \
            --bin ${{ env.BINARY_NAME }} \
            --target ${{ matrix.target }}

      - name: Upload slice ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: slice-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

  macos-bundle:
    name: Create, Sign, Notarize & Upload Universal DMG
    needs: macos-universal
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download x86_64 slice
        uses: actions/download-artifact@v4
        with:
          name: slice-x86_64
          path: slice-x86_64

      - name: Download arm64 slice
        uses: actions/download-artifact@v4
        with:
          name: slice-arm64
          path: slice-arm64

      - name: Build & Assemble Universal .app
        run: |
          APP="${{ env.APP_NAME }}.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          
          # Merge slices and create .app bundle
          lipo slice-x86_64/${{ env.BINARY_NAME }} \
               slice-arm64/${{ env.BINARY_NAME }} \
            -create -output "$APP/Contents/MacOS/${{ env.APP_NAME }}"
          
          # Write Info.plist and generate icons
          INFO_PLIST="<?xml version='1.0' encoding='UTF-8'?>
          <!DOCTYPE plist PUBLIC '-//Apple//DTD PLIST 1.0//EN' 'http://www.apple.com/DTDs/PropertyList-1.0.dtd'>
          <plist version='1.0'>
          <dict>
            <key>CFBundleExecutable</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>com.yourcompany.${{ env.APP_NAME }}</string>
            <key>CFBundleName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleVersion</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>"
          echo "$INFO_PLIST" > "$APP/Contents/Info.plist"
          ICONSET="$APP/Contents/Resources/icons.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_256x256@2x.png"
          sips -z 1024 1024 "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_512x512.png"
          sips -z 2048 2048 "$APP/Contents/Resources/${{ env.ICON_PNG }}" --out "$ICONSET/icon_512x512@2x.png"
          iconutil --convert icns --output "$APP/Contents/Resources/${{ env.APP_NAME }}.icns" "$ICONSET"
          rm -r "$ICONSET"

      - name: Fix Permissions
        run: |
          APP="${{ env.APP_NAME }}.app"
          find "$APP" -type d -exec chmod 755 {} +
          find "$APP" -type f -exec chmod 644 {} +
          chmod +x "$APP/Contents/MacOS/${{ env.APP_NAME }}"

      - name: Check Signing Requirements
        id: check-signing
        env:
          P12_BASE64: ${{ secrets.DEV_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEV_ID_P12_PASSWORD }}
          DEV_ID: ${{ secrets.DEV_IDENTITY_NAME }}
          APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          APP_PASS: ${{ secrets.NOTARIZE_APP_SPECIFIC_PASS }}
          TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          echo "Running on: ${{ github.ref }}"
          echo "Event type: ${{ github.event_name }}"
          echo "Code signing available: $([ -n "$P12_BASE64" ] && [ -n "$P12_PASSWORD" ] && [ -n "$DEV_ID" ] && echo "yes" || echo "no")"
          echo "Notarization available: $([ -n "$APPLE_ID" ] && [ -n "$APP_PASS" ] && [ -n "$TEAM_ID" ] && echo "yes" || echo "no")"
          echo "can_sign=$([ -n "$P12_BASE64" ] && [ -n "$P12_PASSWORD" ] && [ -n "$DEV_ID" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "can_notarize=$([ -n "$APPLE_ID" ] && [ -n "$APP_PASS" ] && [ -n "$TEAM_ID" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

      - name: Import Developer ID Certificate
        if: steps.check-signing.outputs.can_sign == 'true'
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Code-sign with Hardened Runtime & Timestamp
        if: steps.check-signing.outputs.can_sign == 'true'
        run: |
          APP="${{ env.APP_NAME }}.app"
          codesign --force --deep --options runtime --timestamp \
            --sign "${{ secrets.DEV_IDENTITY_NAME }}" "$APP"

      - name: Create DMG
        run: |
          DMG="dist/${{ env.APP_NAME }}-${{ env.VERSION }}-macos-universal.dmg"
          mkdir -p dist dmg-staging
          cp -R "${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG"
          rm -rf dmg-staging
          echo "$DMG" > dmg-path.txt

      - name: Notarize & Staple DMG
        if: |
          github.event_name == 'push' && 
          github.ref == 'refs/heads/master' &&
          steps.check-signing.outputs.can_sign == 'true' &&
          steps.check-signing.outputs.can_notarize == 'true'
        run: |
          DMG=$(cat dmg-path.txt)
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --password "${{ secrets.NOTARIZE_APP_SPECIFIC_PASS }}" \
            --team-id "${{ secrets.NOTARIZE_TEAM_ID }}" \
            --wait --verbose
          xcrun stapler staple "$DMG"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-macos-universal${{ steps.check-signing.outputs.can_sign == 'true' && '-signed' || '' }}.dmg
          path: dist/${{ env.APP_NAME }}-${{ env.VERSION }}-macos-universal.dmg


  # Windows build
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: x86_64-pc-windows-msvc
      - name: Build and Rename Executable
        shell: bash
        run: |
          cargo build --release --bin ${{ env.BINARY_NAME }} --target x86_64-pc-windows-msvc
          mkdir -p release
          cp target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe \
             release/${{ env.APP_NAME }}-${{ env.VERSION }}-windows-x86_64.exe
      - name: Upload Windows .exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-windows-x86_64.exe
          path: release/${{ env.APP_NAME }}-${{ env.VERSION }}-windows-x86_64.exe