name: Rust Cross-Platform Builds

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '1.0.0'

env:
  BINARY_NAME: idevice_pair
  APP_NAME: iDevicePair
  VERSION: ${{ github.event.inputs.version }}
  ICON_PNG: icon.png
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────────
  # Linux builds: AppImage
  # ────────────────────────────────────────────────────────────────────────────────
  build-appimage:
    name: Build & Upload AppImage (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            toolfile: appimagetool-x86_64.AppImage
          - arch: aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            toolfile: appimagetool-aarch64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libatk1.0-dev libgtk-3-dev \
            pkg-config libfuse2 appstream usbmuxd \
            libimobiledevice6 libimobiledevice-utils \
            libusbmuxd-tools

      - name: Build binary
        run: |
          cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Prepare AppDir
        run: |
          set -e
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/{bin,lib,share/icons/hicolor/256x256/apps,share/applications} \
                   $APPDIR/etc/udev/rules.d

          # 1) Copy our app and bundled tools
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} $APPDIR/usr/bin/
          cp $(which usbmuxd)                            $APPDIR/usr/bin/
          cp $(which iproxy)                             $APPDIR/usr/bin/
          cp $(which idevice_id)                         $APPDIR/usr/bin/

          # 2) Copy udev rules
          cp /lib/udev/rules.d/39-usbmuxd.rules           $APPDIR/etc/udev/rules.d/

          # 3) Bundle required shared libraries
          for bin in $APPDIR/usr/bin/*; do
            ldd "$bin" \
              | grep "=> /" \
              | awk '{print $3}' \
              | xargs -r -I '{}' cp -v '{}' $APPDIR/usr/lib/
          done

          # 4) Install icons & desktop file
          ICON_NAME=${ICON_PNG##*/}; BASENAME=${ICON_NAME%.*}
          cp ${{ env.ICON_PNG }} $APPDIR/${BASENAME}.png
          cp ${{ env.ICON_PNG }} $APPDIR/usr/share/icons/hicolor/256x256/apps/${BASENAME}.png
          cat > $APPDIR/usr/share/applications/${{ env.BINARY_NAME }}.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=${{ env.APP_NAME }}
          Exec=${{ env.BINARY_NAME }}
          Icon=${BASENAME}
          Categories=Utility;
          EOF

      - name: Create AppRun + make executable
        run: |
          cat > AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          set -e

          HERE="$(dirname "$(readlink -f "$0")")"

          # Ensure bundled usbmuxd is executable
          chmod +x "$HERE/usr/bin/usbmuxd"

          # Launch usbmuxd in foreground if needed
          if ! pgrep -x usbmuxd &>/dev/null; then
            "$HERE/usr/bin/usbmuxd" --foreground --verbose &
            # wait up to 5s for the socket
            for i in {1..10}; do
              [ -S /var/run/usbmuxd ] && break
              sleep 0.5
            done
          fi

          # Prepend to PATH/lib path
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:${LD_LIBRARY_PATH:-}"

          # Exec main binary
          exec "$HERE/usr/bin/${{ env.BINARY_NAME }}" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Download AppImageTool
        run: |
          chmod +x ${{ matrix.toolfile }} && mv ${{ matrix.toolfile }} appimagetool.AppImage

      - name: Build AppImage
        run: |
          FNAME="${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage"
          ./appimagetool.AppImage AppDir "$FNAME"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage
          path: |
            ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage