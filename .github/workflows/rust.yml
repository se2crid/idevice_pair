name: Rust Cross-Platform Builds

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '1.0.0'

env:
  BINARY_NAME: idevice_pair
  APP_NAME: iDevicePair
  VERSION: ${{ github.event.inputs.version }}
  ICON_PNG: icon.png
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────────────────────────────────────────
  # Linux builds: AppImage
  # ────────────────────────────────────────────────────────────────────────────────
  build-appimage:
    name: Build & Upload AppImage (Linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libatk1.0-dev libgtk-3-dev \
            pkg-config libfuse2 appstream usbmuxd \
            libimobiledevice6 libimobiledevice-utils \
            libusbmuxd-tools curl

      - name: Install usbmuxd systemd units inline
        run: |
          # … (omitted for brevity; same as before) …

      - name: Enable & start usbmuxd socket
        run: |
          sudo systemctl enable --now usbmuxd.socket
          sudo ls -l /var/run/usbmuxd

      - name: Build binary
        run: |
          cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Prepare AppDir
        run: |
          # … (omitted for brevity; same as before) …

      - name: Create AppRun + make executable
        run: |
          # … (omitted for brevity; same as before) …

      - name: Download AppImageTool
        run: |
          # Fetch the correct AppImageTool for this arch from AppImageKit “continuous” release
          wget -qO appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage \
            && chmod +x appimagetool.AppImage
      - name: Build AppImage
        run: |
          FNAME="${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage"
          ./appimagetool.AppImage AppDir "$FNAME"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage
          path: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}.AppImage
